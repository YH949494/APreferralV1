# Separate Fly app for OpenWebUI Code Interpreter Jupyter execution.
# Deploy with: cd jupyter-fly && fly deploy --config fly.toml --app "$JUPYTER_APP"
# Keep this service separate from the existing OpenWebUI Fly app and volume.

primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  JUPYTER_WORK_DIR = "/tmp/jupyter-work"

[http_service]
  internal_port = 8888
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "performance-2x"
  memory = "4gb"
